name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  toolchain:
    # Single source of truth for the toolchain versions every device job uses.
    # ptoas is declared in toolchain/versions.env (pypto-owned); pto-isa is
    # DERIVED from the pinned runtime submodule's runtime/pto_isa.pin (the
    # runtime owns it and enforces build == run). Both are re-exported as outputs
    # consumed via `needs.toolchain.outputs.*`. Bumping the runtime submodule
    # moves pypto's pto-isa in lockstep.
    #
    # Runs on the same self-hosted arm64 CPU runner + container as clang-tidy so
    # the whole pipeline stays on in-house infra (no GitHub-hosted minutes) and
    # every job sees the same base image. This job only greps/reads pinned files,
    # so it needs no pip cache mount.
    runs-on: [self-hosted, linux, arm64, cpu]
    container:
      image: localhost:5000/ci-py310:latest
    permissions:
      contents: read
    outputs:
      pto_isa_commit: ${{ steps.read.outputs.PTO_ISA_COMMIT }}
      ptoas_version: ${{ steps.read.outputs.PTOAS_VERSION }}
      ptoas_sha256_aarch64: ${{ steps.read.outputs.PTOAS_SHA256_AARCH64 }}
      ptoas_sha256_x86_64: ${{ steps.read.outputs.PTOAS_SHA256_X86_64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Read pinned toolchain versions
        id: read
        run: |
          # ptoas: pypto-owned, from versions.env
          grep -E '^[A-Z0-9_]+=' toolchain/versions.env >> "$GITHUB_OUTPUT"
          # pto-isa: derived from the pinned runtime submodule (runtime owns it)
          commit="$(tr -d '[:space:]' < runtime/pto_isa.pin)"
          if ! printf '%s' "$commit" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error file=runtime/pto_isa.pin::expected a 40-char hex commit, got '$commit'"
            exit 1
          fi
          echo "PTO_ISA_COMMIT=$commit" >> "$GITHUB_OUTPUT"
          echo "pinned pto-isa (from runtime submodule): $commit"
      - name: Guard against un-centralized toolchain literals
        run: |
          status=0
          if grep -rn -- '--pto-isa''-commit' python/ tests/ .github/workflows/; then
            echo "::error::The PyPTO pto-isa commit override has been removed. Bump runtime/pto_isa.pin instead."
            status=1
          fi
          if grep -rnE 'git checkout [0-9a-f]{40}' .github/workflows/; then
            echo "::error::Hardcoded pto-isa commit found in a workflow. Use \${{ needs.toolchain.outputs.pto_isa_commit }}; pto-isa is bumped via the runtime submodule (runtime/pto_isa.pin)."
            status=1
          fi
          if grep -rnE 'PTOAS_SHA256(_[A-Z0-9]+)?: *[0-9a-f]{64}' .github/workflows/; then
            echo "::error::Hardcoded PTOAS_SHA256 found in a workflow. Reference needs.toolchain.outputs.ptoas_sha256_* and bump toolchain/versions.env instead."
            status=1
          fi
          exit $status

  pre-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: pre-commit
      uses: pre-commit/action@v3.0.0
      with:
        extra_args: --all-files

  clang-tidy:
    runs-on: [self-hosted, linux, arm64, cpu]
    container:
      image: localhost:5000/ci-py310:latest
      options: >-
        -v /home/ci-runner/hw-native-sys-pypto/ci-cache/pip:/root/.cache/pip

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Checkout dsa-solver
      uses: actions/checkout@v4
      with:
        repository: tonibohnlein/dsa-solver
        ref: f908eddbd63e37c8edbe1d3be37c213d429cbed7
        path: dsa-solver
        submodules: recursive

    - name: Fetch base branch for diff
      if: github.event_name == 'pull_request'
      run: git fetch origin ${{ github.base_ref }} --depth=1

    # The runner image ships Ubuntu's clang-tidy 14, which predates checks the
    # project enables (misc-include-cleaner needs LLVM 17+) and skips them
    # silently.  Install the version clang_tidy.py requires, reading it from the
    # script so the pin has a single source of truth.
    - name: Install pinned clang-tidy
      env:
        # The job mounts the runner's pip cache at /root/.cache/pip, but Actions
        # sets HOME=/github/home, so pip never looks there and re-fetches the
        # 39 MB wheel on every run — which is what makes this step flaky.
        PIP_CACHE_DIR: /root/.cache/pip
      run: |
        VERSION=$(python -c "import sys; sys.path.insert(0, 'tests/lint'); from clang_tidy import REQUIRED_VERSION; print(REQUIRED_VERSION)")
        python -m pip install --retries 5 --timeout 60 "clang-tidy==${VERSION}" nanobind
        clang-tidy --version

    - name: Configure DSA-enabled compile database
      run: |
        cmake -S dsa-solver -B dsa-solver/build \
          -DCMAKE_BUILD_TYPE=Release \
          -DDSA_ENABLE_MINIMALLOC_BASELINE=OFF \
          -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/dsa-install"
        cmake --build dsa-solver/build --parallel 2
        cmake --install dsa-solver/build
        DSA_SOLVER_DIR="$(dirname "$(find "$RUNNER_TEMP/dsa-install" -name dsa-solver-config.cmake -print -quit)")"
        test -f "$DSA_SOLVER_DIR/dsa-solver-config.cmake"
        cmake -S . -B "$RUNNER_TEMP/pypto-clang-tidy" \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DPYPTO_ENABLE_DSA_SOLVER=ON \
          -Ddsa-solver_DIR="$DSA_SOLVER_DIR" \
          -Dnanobind_DIR="$(python -c 'import nanobind; print(nanobind.cmake_dir())')"
        cmake --build "$RUNNER_TEMP/pypto-clang-tidy" --target project_libbacktrace --parallel 2

    - name: Run clang-tidy
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          python tests/lint/clang_tidy.py --strict-version --jobs=2 -B "$RUNNER_TEMP/pypto-clang-tidy" --diff-base=origin/${{ github.base_ref }}
        else
          python tests/lint/clang_tidy.py --strict-version --jobs=2 -B "$RUNNER_TEMP/pypto-clang-tidy"
        fi

  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10"]
        # Linux runs the full unit-test suite; macOS runs only a small
        # foundational smoke subset. The C++ extension's macOS compilation is
        # already validated by the `pip install -v .[dev]` build step below, so
        # macOS only needs to confirm the built module imports and executes —
        # duplicating all ~6.7k cases on both OSes is wasted CI time. The `include`
        # entries add a per-OS `ut_paths` without creating extra jobs, so the
        # required-check names `unit-tests (<os>, 3.10)` are preserved.
        include:
          - os: ubuntu-latest
            ut_paths: tests/ut
            ut_label: full suite
          - os: macos-latest
            # Smoke: core object system (dtype/error/logging) + basic IR node
            # construction — the layers where a macOS-specific binding or
            # compile/execute break would surface. Widen this list if a macOS-only
            # regression slips through.
            ut_paths: tests/ut/core tests/ut/ir/core
            ut_label: smoke subset (compile + execute check)

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install project and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -v .[dev]

    - name: Test unit tests (${{ matrix.ut_label }})
      run: pytest ${{ matrix.ut_paths }} -n auto --maxprocesses 8 -v

  dsa-integration-tests:
    # The normal wheel intentionally keeps the optional adapter disabled. This
    # job builds the public solver package first, enables the adapter, and runs
    # the exporter/solver/validator/writeback tests with bounded parallelism.
    runs-on: ubuntu-latest
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2
    steps:
    - name: Checkout PyPTO
      uses: actions/checkout@v4
      with:
        submodules: true
    - name: Checkout dsa-solver
      uses: actions/checkout@v4
      with:
        repository: tonibohnlein/dsa-solver
        ref: f908eddbd63e37c8edbe1d3be37c213d429cbed7
        path: dsa-solver
        submodules: recursive
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Build and install dsa-solver
      run: |
        cmake -S dsa-solver -B dsa-solver/build -DCMAKE_BUILD_TYPE=Release -DDSA_ENABLE_MINIMALLOC_BASELINE=OFF -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/dsa-install"
        cmake --build dsa-solver/build --parallel 2
        cmake --install dsa-solver/build
    - name: Install DSA-enabled PyPTO
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        DSA_SOLVER_DIR="$(dirname "$(find "$RUNNER_TEMP/dsa-install" -name dsa-solver-config.cmake -print -quit)")"
        test -f "$DSA_SOLVER_DIR/dsa-solver-config.cmake"
        CMAKE_ARGS="-DPYPTO_ENABLE_DSA_SOLVER=ON -Ddsa-solver_DIR=$DSA_SOLVER_DIR" pip install -v .[dev]
    - name: Test DSA adapter integration
      run: >-
        pytest tests/ut/codegen/test_memory_planner_switch.py
        tests/ut/ir/transforms/test_allocate_memory_addr_pass.py
        tests/ut/runtime/test_run_config.py::TestRunConfigCompileForwarding
        tests/ut/jit/test_decorator.py::TestCompileKwargForwarding
        -n 2 -v

  codegen-tests:
    # Codegen-only: verifies IR → kernel/orch C++ generation without going
    # on-board. --codegen-only skips assembly (ptoas), pto-isa, simpler and
    # device execution (see tests/st/harness/core/test_runner.py), so this
    # runs on a CPU runner and never competes for NPU cards.
    runs-on: [self-hosted, linux, arm64, cpu]
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /root/.cache/ccache
      CCACHE_MAXSIZE: 30G
      # This job (root, in-container) shares the host ci-cache/ccache dir with the
      # de-dockerized device jobs (ci-runner). 000 keeps root-written cache files
      # group/world-writable so ci-runner can update / LRU-evict them, and vice
      # versa — same rationale as pypto-lib's sim/a2a3 cache sharing.
      CCACHE_UMASK: '000'
      PIP_CACHE_DIR: /root/.cache/pip
    container:
      image: localhost:5000/ci-py310:latest
      options: >-
        -v /home/ci-runner/hw-native-sys-pypto/ci-cache/pip:/root/.cache/pip
        -v /home/ci-runner/hw-native-sys-pypto/ci-cache/ccache:/root/.cache/ccache
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Show ccache stats (before)
        run: ccache -s || true

      - name: Install project and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core nanobind cmake ninja
          rm -rf ./build ./_skbuild
          test ! -e ./build && test ! -e ./_skbuild && echo "OK: pypto build removed"
          pip install --no-build-isolation .[dev]

      - name: Show ccache stats (after)
        run: ccache -s || true

      - name: Test codegen (codegen-only, no device)
        # test_torch_codegen_paged_attention does a numeric golden compare whose
        # bf16/fp16 accumulation is sensitive to the host torch/BLAS build; it
        # drifts past tolerance on this CPU container, so it runs in the npu
        # system-tests job instead (it needs no device, only that environment).
        run: >-
          pytest tests/st/codegen -v --codegen-only
          --ignore=tests/st/codegen/torch/test_torch_codegen_paged_attention.py

  system-tests:
    # Batched shard A (mechanism A): the HEAVY device_batch directories — all of
    # tests/st EXCEPT runtime/ops + runtime/cross_core. The batched `Test system
    # tests` step used to run ~7-15 min and dominated the whole job, so it is
    # split by directory across two jobs that run in parallel:
    #   - system-tests        (this job): device_batch on the heavy dirs (the
    #                                      model tests in framework_and_models +
    #                                      scheduling + control_flow dominate).
    #   - system-tests-direct (sibling)  : device_batch on ops + cross_core (cheap
    #                                      compiles) + all the direct-device
    #                                      (mechanism B) + DFX steps.
    # Measured on run 29468368196: this heavy batched shard ≈ 404s vs the light
    # ops/cross_core shard ≈ 80s — ops/cross_core have MANY tests but cheap
    # compiles, so the direct + DFX tail (~268s) is paired with them, not here.
    # Coverage is preserved: heavy dirs ∪ ops/cross_core = the original batched
    # scope, with no overlap (this shard --ignore's ops/cross_core). Both jobs do
    # their own (ccache-shared) build; keep them in sync on setup and on the
    # directory partition (re-check the balance if a heavy new dir is added).
    #
    # No container: compile + golden run card-free on this CPU host, and each
    # case's device run borrows an NPU from the host-level `task-submit --device
    # auto` queue (mechanism A; --execute-via-task-submit). The job therefore
    # holds no card and is no longer pinned to a single-device runner. Host setup
    # mirrors dist-system-tests (conda py310 + per-job venv + activate.sh) so the
    # CI job and the task-submit child share one filesystem / absolute path —
    # the compiled .o/.so in the precompile cache_dir are readable by the child
    # with no path translation.
    #
    # Checkout / install happen under ./st-checkout so they don't collide with
    # other jobs' workspaces.
    needs: toolchain
    # Checkout + test only — no write scopes needed on GITHUB_TOKEN.
    permissions:
      contents: read
    # TEST MODE: keep the device runner so DEVICE_ID/DEVICE_ID exist and pin
    # task-submit to that card (validates the new compile-card-free + task-submit
    # execute flow deterministically). FLIP TO PROD: change this to
    # `[self-hosted, linux, arm64, cpu]` and drop --task-submit-device below so
    # cases borrow any free card via `--device auto`.
    runs-on: [self-hosted, linux, arm64, npu]
    defaults:
      run:
        working-directory: st-checkout
    env:
      ASCEND_HOME_PATH: /usr/local/Ascend/cann-9.0.0
      PTOAS_ROOT: ${{ github.workspace }}/st-checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/st-checkout/pto-isa
      PTOAS_VERSION: ${{ needs.toolchain.outputs.ptoas_version }}
      PTOAS_SHA256: ${{ needs.toolchain.outputs.ptoas_sha256_aarch64 }}
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /home/ci-runner/hw-native-sys-pypto/ci-cache/ccache
      CCACHE_MAXSIZE: 30G
      # Shared with the container codegen-tests job (root) via the same ci-cache
      # dir; 000 keeps cache files mutually writable across root and ci-runner.
      # CCACHE_NAMESPACE is set by the "Scope ccache to pto-isa version" step.
      CCACHE_UMASK: '000'
      # Per-job pip dir: pip has no shared-umask knob, so the root-owned
      # codegen-tests pip mount can't be reused by this ci-runner host job.
      PIP_CACHE_DIR: /home/ci-runner/hw-native-sys-pypto/ci-cache/pip-st
    steps:
      - name: Fetch composite action definitions
        # Local `uses: ./.github/actions/...` resolves against $GITHUB_WORKSPACE,
        # but this job checks the repo out into ./st-checkout — sparse-fetch just
        # the action defs at the workspace root first (clean: false leaves sibling
        # subdir checkouts on this persistent runner untouched).
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          # Bootstrap only fetches the public .github/actions tree; it doesn't
          # need the token persisted into .git/config afterward (zizmor artipacked).
          persist-credentials: false

      - name: Setup NPU device job
        uses: ./.github/actions/setup-npu-device-job
        with:
          checkout-path: st-checkout
          pto-isa-commit: ${{ needs.toolchain.outputs.pto_isa_commit }}

      - name: Test system tests (batched shard A — heavy dirs, all but ops/cross_core)
        timeout-minutes: 30
        # Mechanism A: compile + golden run card-free in the precompile pool;
        # each case's device run borrows an NPU via `task-submit --device auto`
        # (--execute-via-task-submit). No --device: the harness no longer owns a
        # card. cache_dir auto-lands under the repo's build_output (host-visible
        # to the task-submit child), cleaned at session end.
        #
        # SHARD A = the HEAVY batched dirs: device_batch on every dir EXCEPT
        # ops + cross_core (which are the cheap-compile shard, run in
        # `system-tests-direct`), plus the standing exclusions — distributed
        # (own multi-card job), codegen (own CPU --codegen-only job), and
        # test_dump_tag (its own --dump-args DFX step in the sibling job). The two
        # shards --ignore each other's dirs so no batched test runs twice.
        run: |
          source activate.sh
          # TEST MODE: --task-submit-device pins EVERY device run (batched + the
          # undiscovered-case tail) to this runner's card (DEVICE_ID) through
          # task-submit's per-card lock. FLIP TO PROD: cpu runner, drop
          # --task-submit-device, use --device auto (borrow any free card).
          # DEVICE_ID must be non-empty, else task-submit would auto-borrow a
          # host card this runner does not own (halMemCtl EACCES).
          echo "[device] DEVICE_ID=$DEVICE_ID"
          test -n "$DEVICE_ID" || { echo "DEVICE_ID is empty in the runner env"; exit 1; }
          # `-m device_batch` (auto-applied to tests using test_runner.run):
          # compile + golden card-free, device run BATCHED via task-submit. The
          # `not device_batch` (direct @pl.jit / config=test_config) tests for
          # ALL dirs run in the `system-tests-direct` job.
          python -m pytest tests/st -v -m device_batch \
            --ignore=tests/st/distributed \
            --ignore=tests/st/codegen \
            --ignore=tests/st/runtime/ops \
            --ignore=tests/st/runtime/cross_core \
            --ignore=tests/st/runtime/framework_and_models/test_dump_tag.py \
            --precompile-workers=32 --execute-via-task-submit --execute-batch-size=64 \
            --task-queue-timeout=1800 --task-max-time=600 --task-submit-device="$DEVICE_ID"

      - name: Kill orphaned task-submit tasks
        if: always()
        uses: ./.github/actions/kill-orphaned-tasks
        with:
          checkout-path: st-checkout

  system-tests-direct:
    # The complement of `system-tests`, sized to balance it:
    #   1. Batched shard B (mechanism A): device_batch on the LIGHT dirs — only
    #      runtime/ops + runtime/cross_core. These have many tests but cheap
    #      compiles (~80s measured vs ~404s for the heavy dirs in `system-tests`),
    #      so they are paired here with the direct + DFX tail.
    #   2. Direct-device (mechanism B): `-m 'not device_batch'` over ALL of
    #      tests/st (the in-process @pl.jit / config=test_config tests, including
    #      the direct tests under the heavy dirs that `system-tests` skips).
    #   3. DFX steps: paged-attention / multi-orch L2 / swimlane / dump-args.
    # Balance (run 29468368196): heavy batched ≈ 404s alone in `system-tests`;
    # here ≈ 80s batched + ~168s direct + ~100s DFX ≈ 348s, so the two jobs finish
    # within ~1 min of each other. Setup is identical to `system-tests` (same
    # composite action, same env) — keep the two in sync, including the shard
    # partition (ops/cross_core here must be exactly the dirs `system-tests`
    # --ignore's). This job checks out under ./st-direct-checkout so it never
    # collides with system-tests' ./st-checkout on the shared self-hosted host,
    # and cleans up its own orphaned task-submit tasks.
    needs: toolchain
    # Checkout + test only — no write scopes needed on GITHUB_TOKEN.
    permissions:
      contents: read
    # TEST MODE: keep the device runner so DEVICE_ID exists and pin task-submit
    # to that card. FLIP TO PROD: change this to
    # `[self-hosted, linux, arm64, cpu]` and drop --task-submit-device / the
    # explicit --device below so cases borrow any free card via `--device auto`.
    runs-on: [self-hosted, linux, arm64, npu]
    defaults:
      run:
        working-directory: st-direct-checkout
    env:
      ASCEND_HOME_PATH: /usr/local/Ascend/cann-9.0.0
      PTOAS_ROOT: ${{ github.workspace }}/st-direct-checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/st-direct-checkout/pto-isa
      PTOAS_VERSION: ${{ needs.toolchain.outputs.ptoas_version }}
      PTOAS_SHA256: ${{ needs.toolchain.outputs.ptoas_sha256_aarch64 }}
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /home/ci-runner/hw-native-sys-pypto/ci-cache/ccache
      CCACHE_MAXSIZE: 30G
      # Shared with the container codegen-tests job (root) via the same ci-cache
      # dir; 000 keeps cache files mutually writable across root and ci-runner.
      # CCACHE_NAMESPACE is set by the "Scope ccache to pto-isa version" step.
      CCACHE_UMASK: '000'
      # Per-job pip dir: pip has no shared-umask knob, so the root-owned
      # codegen-tests pip mount can't be reused by this ci-runner host job.
      PIP_CACHE_DIR: /home/ci-runner/hw-native-sys-pypto/ci-cache/pip-st-direct
    steps:
      - name: Fetch composite action definitions
        # Local `uses: ./.github/actions/...` resolves against $GITHUB_WORKSPACE,
        # but this job checks the repo out into ./st-direct-checkout — sparse-fetch
        # just the action defs at the workspace root first (clean: false leaves
        # sibling subdir checkouts on this persistent runner untouched).
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          # Bootstrap only fetches the public .github/actions tree; it doesn't
          # need the token persisted into .git/config afterward (zizmor artipacked).
          persist-credentials: false

      - name: Setup NPU device job
        uses: ./.github/actions/setup-npu-device-job
        with:
          checkout-path: st-direct-checkout
          pto-isa-commit: ${{ needs.toolchain.outputs.pto_isa_commit }}

      - name: Test system tests (batched shard B — ops + cross_core, cheap compiles)
        timeout-minutes: 30
        # Mechanism A, complement of system-tests' heavy shard: device_batch on
        # ONLY runtime/ops + runtime/cross_core (the cheap-compile dirs, ~80s
        # measured). The heavy dirs run in `system-tests`. Selecting by directory
        # (not by --ignore of everything else) keeps this list short and explicit;
        # `system-tests` --ignore's these two dirs so nothing double-runs. Neither
        # dir contains distributed/codegen/dump_tag, so no --ignore is needed here.
        # Same precompile/task-submit flags as the heavy shard.
        run: |
          source activate.sh
          echo "[device] DEVICE_ID=$DEVICE_ID"
          test -n "$DEVICE_ID" || { echo "DEVICE_ID is empty in the runner env"; exit 1; }
          python -m pytest tests/st/runtime/ops tests/st/runtime/cross_core \
            -v -m device_batch \
            --precompile-workers=32 --execute-via-task-submit --execute-batch-size=64 \
            --task-queue-timeout=1800 --task-max-time=600 --task-submit-device="$DEVICE_ID"

      - name: Test direct-device (mechanism B — one card, in-process)
        timeout-minutes: 30
        # ALL `-m 'not device_batch'` tests across tests/st (both shards' dirs):
        # direct @pl.jit kernel calls / config=test_config (and no-fixture device
        # tests), which execute the device synchronously in-process and cannot be
        # batched. Wrap them whole in ONE task-submit card session and run
        # in-process on the borrowed card (--device=$TASK_DEVICE, no
        # --execute-via-task-submit): one device init for the step, pytest's native
        # full capture on failure. Selection is by marker, so mixed files split
        # per-test and new tests need no edit. swimlane is --ignore'd here — it runs
        # in its own flagged step. (paged_attention has its own step below — passing
        # it as an explicit path here collapses pytest's dir collection.)
        run: |
          source activate.sh
          echo "[device] DEVICE_ID=$DEVICE_ID"
          test -n "$DEVICE_ID" || { echo "DEVICE_ID is empty in the runner env"; exit 1; }
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 1800 \
            --run "cd $GITHUB_WORKSPACE/st-direct-checkout && source activate.sh && python -m pytest \
              tests/st -v -m 'not device_batch' \
              --ignore=tests/st/distributed \
              --ignore=tests/st/codegen \
              --ignore=tests/st/runtime/framework_and_models/test_perf_swimlane.py \
              --device=\$TASK_DEVICE --platform=a2a3"

      - name: Test paged-attention codegen (numeric compare, in device env)
        # tests/st/codegen runs device-free in the CPU codegen-tests job, but this
        # one file's numeric golden compare is unstable on a CPU torch/BLAS build,
        # so it runs here in the device job's environment. Own step (in-process
        # via task-submit) because it lives under the --ignore'd tests/st/codegen.
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 600 \
            --run "cd $GITHUB_WORKSPACE/st-direct-checkout && source activate.sh && python -m pytest \
              tests/st/codegen/torch/test_torch_codegen_paged_attention.py \
              -v --device=\$TASK_DEVICE --platform=a2a3"

      - name: Test multi-orch L2 (isolated pytest invocation)
        # Mechanism B: a single forked pytest wrapped whole in task-submit (no
        # precompile pipeline here). A ``Worker(level=2)`` session leaves runtime
        # state that poisons the next ``Worker(level=3)`` init in the same
        # process, so this file runs in its own pytest invocation.
        timeout-minutes: 5
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 600 \
            --run "cd $GITHUB_WORKSPACE/st-direct-checkout && source activate.sh && python -m pytest tests/st/distributed/test_l2_multi_orch.py -v --device=\$TASK_DEVICE"

      - name: Test swimlane output
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 600 \
            --run "cd $GITHUB_WORKSPACE/st-direct-checkout && source activate.sh && python -m pytest tests/st/runtime/framework_and_models/test_perf_swimlane.py -v --device=\$TASK_DEVICE --platform=a2a3 --enable-l2-swimlane --forked"

      - name: Test dump-args output
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 600 \
            --run "cd $GITHUB_WORKSPACE/st-direct-checkout && source activate.sh && python -m pytest tests/st/runtime/framework_and_models/test_dump_tag.py -v --device=\$TASK_DEVICE --platform=a2a3 --dump-args --forked"

      - name: Kill orphaned task-submit tasks
        if: always()
        uses: ./.github/actions/kill-orphaned-tasks
        with:
          checkout-path: st-direct-checkout

  dist-system-tests:
    # No container: HCCL needs host-only env (HCCL_LOGIC_SUPERPOD_ID, plugin
    # paths from set_env.sh). In docker the chip child silent-crashes in
    # comm_init.
    #
    # Checkout / install happen under ./dist-checkout so they don't collide
    # with system-tests' workspace (which is owned by container root and
    # would EACCES our ci-runner cleanup).
    needs: toolchain
    # Checkout + test only — no write scopes needed on GITHUB_TOKEN.
    permissions:
      contents: read
    # TEST MODE: keep the 2-device runner and pin task-submit to DEVICE_ID
    # (see system-tests). FLIP TO PROD: cpu runner + `--device auto --device-num 2`.
    runs-on: [self-hosted, linux, arm64, npu]
    defaults:
      run:
        working-directory: dist-checkout
    env:
      ASCEND_HOME_PATH: /usr/local/Ascend/cann-9.0.0
      PTOAS_ROOT: ${{ github.workspace }}/dist-checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/dist-checkout/pto-isa
      PTOAS_VERSION: ${{ needs.toolchain.outputs.ptoas_version }}
      PTOAS_SHA256: ${{ needs.toolchain.outputs.ptoas_sha256_aarch64 }}
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /home/ci-runner/hw-native-sys-pypto/ci-cache/ccache
      CCACHE_MAXSIZE: 30G
      # Shared with the container codegen-tests job (root) via the same ci-cache
      # dir; 000 keeps cache files mutually writable across root and ci-runner.
      CCACHE_UMASK: '000'
      # Per-job pip dir: pip has no shared-umask knob, so the root-owned
      # codegen-tests pip mount can't be reused by this ci-runner host job.
      PIP_CACHE_DIR: /home/ci-runner/hw-native-sys-pypto/ci-cache/pip-dist
    steps:
      - name: Fetch composite action definitions
        # Local `uses: ./.github/actions/...` resolves against $GITHUB_WORKSPACE,
        # but this job checks the repo out into ./dist-checkout — sparse-fetch just
        # the action defs at the workspace root first (clean: false leaves sibling
        # subdir checkouts on this persistent runner untouched).
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          # Bootstrap only fetches the public .github/actions tree; it doesn't
          # need the token persisted into .git/config afterward (zizmor artipacked).
          persist-credentials: false

      - name: Setup NPU device job
        uses: ./.github/actions/setup-npu-device-job
        with:
          checkout-path: dist-checkout
          pto-isa-commit: ${{ needs.toolchain.outputs.pto_isa_commit }}
          unset-ring: 'true'

      - name: Test distributed system tests
        timeout-minutes: 15
        # Mechanism B (multi-card): borrow 2 NPUs via `task-submit --device auto
        # --device-num 2` for the whole pytest run; $TASK_DEVICE is the lent set
        # (comma-separated), passed to --device. The job no longer pins an
        # npu-2-device runner. activate.sh already unset PTO2_RING_* (they break
        # HCCL); task-submit preserves that env into the child.
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --device-num 2 --timeout 3600 --max-time 900 \
            --run "cd $GITHUB_WORKSPACE/dist-checkout && source activate.sh && python -m pytest tests/st/distributed -v --device=\$TASK_DEVICE --ignore=tests/st/distributed/test_l2_multi_orch.py"

      - name: Kill orphaned task-submit tasks
        if: always()
        uses: ./.github/actions/kill-orphaned-tasks
        with:
          checkout-path: dist-checkout

  pypto-lib-model:
    # No container: each model run borrows an NPU from the host-level
    # `task-submit --device auto` queue (mechanism B — the whole `python
    # models/...` invocation, which compiles + runs in one process, is wrapped).
    # Host setup mirrors dist-system-tests (conda py310 + venv + activate.sh);
    # the job holds no card and runs on a CPU runner. task-submit preserves the
    # caller's environment (per daily_ci.yml `a5-system-tests`), so sourcing
    # activate.sh before the wrap is enough — the child inherits the venv + env.
    needs: toolchain
    # Checkout + clone pypto-lib + test only — no write scopes needed on GITHUB_TOKEN.
    permissions:
      contents: read
    # TEST MODE: keep the device runner and pin task-submit to its card (see
    # system-tests). FLIP TO PROD: cpu runner + `--device auto`.
    runs-on: [self-hosted, linux, arm64, npu]
    defaults:
      run:
        working-directory: lib-checkout
    env:
      ASCEND_HOME_PATH: /usr/local/Ascend/cann-9.0.0
      PTOAS_ROOT: ${{ github.workspace }}/lib-checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/lib-checkout/pto-isa
      PTOAS_VERSION: ${{ needs.toolchain.outputs.ptoas_version }}
      PTOAS_SHA256: ${{ needs.toolchain.outputs.ptoas_sha256_aarch64 }}
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /home/ci-runner/hw-native-sys-pypto/ci-cache/ccache
      CCACHE_MAXSIZE: 30G
      # Shared with the container codegen-tests job (root) via the same ci-cache
      # dir; 000 keeps cache files mutually writable across root and ci-runner.
      CCACHE_UMASK: '000'
      # Per-job pip dir: pip has no shared-umask knob, so the root-owned
      # codegen-tests pip mount can't be reused by this ci-runner host job.
      PIP_CACHE_DIR: /home/ci-runner/hw-native-sys-pypto/ci-cache/pip-lib
    steps:
      - name: Fetch composite action definitions
        # Local `uses: ./.github/actions/...` resolves against $GITHUB_WORKSPACE,
        # but this job checks the repo out into ./lib-checkout — sparse-fetch just
        # the action defs at the workspace root first (clean: false leaves sibling
        # subdir checkouts on this persistent runner untouched).
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          # Bootstrap only fetches the public .github/actions tree; it doesn't
          # need the token persisted into .git/config afterward (zizmor artipacked).
          persist-credentials: false

      - name: Setup NPU device job
        uses: ./.github/actions/setup-npu-device-job
        with:
          checkout-path: lib-checkout
          pto-isa-commit: ${{ needs.toolchain.outputs.pto_isa_commit }}

      - name: Clone pypto-lib (Qwen3-14B + DeepSeek-V4 models)
        # $GITHUB_WORKSPACE/pypto-lib is a sibling of lib-checkout, so
        # actions/checkout won't clean it on a persistent self-hosted runner — a
        # leftover dir from a previous run makes `git clone` fail with
        # "destination path already exists". Remove it first (mirrors daily_ci).
        run: |
          rm -rf "$GITHUB_WORKSPACE/pypto-lib"
          git clone --depth 1 https://github.com/hw-native-sys/pypto-lib.git "$GITHUB_WORKSPACE/pypto-lib"

      - name: Install pypto-lib runner dependencies
        run: |
          source activate.sh
          pip install nanobind torch

      # Each model run borrows a card via task-submit for the whole `python ...`
      # invocation (compile + run). task-submit propagates the inner exit code,
      # so a model crash fails the step. $TASK_DEVICE is the lent card.
      - name: Run pypto-lib Qwen3-14B decode example
        env:
          PYTHONPATH: ${{ github.workspace }}/pypto-lib
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 1800 \
            --run "source $GITHUB_WORKSPACE/lib-checkout/activate.sh && cd $GITHUB_WORKSPACE/pypto-lib && python models/qwen3/14b/decode_fwd.py -p a2a3 -d \$TASK_DEVICE"

      # Prefill exercises the dynamic-shape host path that decode does not: its
      # token axis is a `pl.dynamic()` symbol, the per-layer temp is sized from
      # `pl.tensor.dim(...)`, and the layer result is reassigned to the same
      # loop-carried var. Regressions in cross-function dynamic-shape typing
      # surface here (and only here) before they reach pypto-serving.
      - name: Run pypto-lib Qwen3-14B prefill example
        env:
          PYTHONPATH: ${{ github.workspace }}/pypto-lib
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 1800 \
            --run "source $GITHUB_WORKSPACE/lib-checkout/activate.sh && cd $GITHUB_WORKSPACE/pypto-lib && python models/qwen3/14b/prefill_fwd.py -p a2a3 -d \$TASK_DEVICE"

      # NOTE: Qwen3-14B decode performance monitoring (L2-swimlane makespan +
      # perf_guard) lives in the daily_ci.yml `qwen3-perf` job, not here. Per-PR
      # CI only checks functional correctness; perf is noisy (~8.5% jitter) and
      # is sampled daily with multiple runs averaged to keep the signal stable.

      - name: Run pypto-lib DeepSeek-V4 decode_attention_swa example
        env:
          PYTHONPATH: ${{ github.workspace }}/pypto-lib
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 1800 \
            --run "source $GITHUB_WORKSPACE/lib-checkout/activate.sh && cd $GITHUB_WORKSPACE/pypto-lib && python models/deepseek/v4/decode_attention_swa.py -p a2a3 -d \$TASK_DEVICE"

      - name: Run pypto-lib DeepSeek-V4 decode_attention_hca example
        env:
          PYTHONPATH: ${{ github.workspace }}/pypto-lib
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 1800 \
            --run "source $GITHUB_WORKSPACE/lib-checkout/activate.sh && cd $GITHUB_WORKSPACE/pypto-lib && python models/deepseek/v4/decode_attention_hca.py -p a2a3 -d \$TASK_DEVICE"

      - name: Run pypto-lib DeepSeek-V4 prefill_attention_csa example
        env:
          PYTHONPATH: ${{ github.workspace }}/pypto-lib
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 1800 \
            --run "source $GITHUB_WORKSPACE/lib-checkout/activate.sh && cd $GITHUB_WORKSPACE/pypto-lib && python models/deepseek/v4/prefill_attention_csa.py -p a2a3 -d \$TASK_DEVICE"

      - name: Run pypto-lib DeepSeek-V4 prefill_attention_hca example
        env:
          PYTHONPATH: ${{ github.workspace }}/pypto-lib
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 1800 \
            --run "source $GITHUB_WORKSPACE/lib-checkout/activate.sh && cd $GITHUB_WORKSPACE/pypto-lib && python models/deepseek/v4/prefill_attention_hca.py -p a2a3 -d \$TASK_DEVICE"

      - name: Run pypto-lib DeepSeek-V4 prefill_attention_swa example
        env:
          PYTHONPATH: ${{ github.workspace }}/pypto-lib
        run: |
          source activate.sh
          task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 1800 \
            --run "source $GITHUB_WORKSPACE/lib-checkout/activate.sh && cd $GITHUB_WORKSPACE/pypto-lib && python models/deepseek/v4/prefill_attention_swa.py -p a2a3 -d \$TASK_DEVICE"

      - name: Kill orphaned task-submit tasks
        if: always()
        uses: ./.github/actions/kill-orphaned-tasks
        with:
          checkout-path: lib-checkout

  system-tests-a5sim:
    needs: toolchain
    runs-on: ubuntu-latest
    env:
      PTOAS_ROOT: ${{ github.workspace }}/ptoas-bin
      PTOAS_VERSION: ${{ needs.toolchain.outputs.ptoas_version }}
      PTOAS_SHA256: ${{ needs.toolchain.outputs.ptoas_sha256_x86_64 }}
    container:
      image: ghcr.io/hw-native-sys/pypto/github-ci:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install project and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -v .[dev]

      - name: Cache ptoas binary
        id: cache-ptoas
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/ptoas-bin
          key: ptoas-x86_64-${{ env.PTOAS_VERSION }}-${{ env.PTOAS_SHA256 }}

      - name: Install ptoas
        if: steps.cache-ptoas.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --retry 3 --retry-all-errors \
            https://github.com/hw-native-sys/PTOAS/releases/download/${{ env.PTOAS_VERSION }}/ptoas-bin-x86_64.tar.gz \
             -o /tmp/ptoas-bin-x86_64.tar.gz
          echo "${{ env.PTOAS_SHA256 }}  /tmp/ptoas-bin-x86_64.tar.gz" | sha256sum -c -
          mkdir -p $GITHUB_WORKSPACE/ptoas-bin
          tar -xzf /tmp/ptoas-bin-x86_64.tar.gz -C $GITHUB_WORKSPACE/ptoas-bin
          chmod +x $GITHUB_WORKSPACE/ptoas-bin/ptoas
          chmod +x $GITHUB_WORKSPACE/ptoas-bin/bin/ptoas

      - name: Install simpler
        run: |
          rm -rf ./runtime/build
          pip install -v ./runtime

      - name: Test A5 system tests (simulator)
        # TestMscatter is deselected: the a5 simulator compiles incore kernels
        # against the runtime's bundled pto-isa, which still clones from the
        # stale PTO-ISA/pto-isa mirror (lacks pto::Coalesce) until the runtime
        # submodule is bumped past simpler #806. Re-enable once that lands.
        run: pytest tests/st/runtime/ops/test_assemble.py tests/st/runtime/ops/test_mscatter.py tests/st/runtime/ops/test_random.py tests/st/runtime/framework_and_models/test_qwen3_decode_scope3_mixed.py tests/st/runtime/control_flow/test_dyn_orch_shape.py::TestDynOrchShapeOperations::test_dyn_orch_paged_attention -v --platform=a5sim --forked -k "not TestMscatter"

      - name: Test A5 cross-core system tests (simulator)
        run: pytest tests/st/runtime/cross_core/test_cross_core.py -v --forked --platform=a5sim

      - name: Test A2A3 cross-core system tests (simulator)
        run: pytest tests/st/runtime/cross_core/test_cross_core.py -v --forked --platform=a2a3sim
