name: Daily CI

on:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = Beijing 02:00 (next day)
  workflow_dispatch:

jobs:
  a5-system-tests:
    runs-on: [self-hosted, a5]
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      PTOAS_ROOT: ${{ github.workspace }}/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/pto-isa
      PTOAS_VERSION: v0.45
      PTOAS_SHA256: d5e4380df7edd4d3eeb23502d57f923e4c912345eccceb5a9a0ec1aac3b5e7d4
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install project and dependencies
        run: |
          pip install -v .[dev]

      - name: Cache ptoas binary
        id: cache-ptoas
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/ptoas-bin
          key: ptoas-aarch64-${{ env.PTOAS_VERSION }}-${{ env.PTOAS_SHA256 }}

      - name: Install ptoas
        if: steps.cache-ptoas.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --retry 3 --retry-all-errors \
            https://github.com/hw-native-sys/PTOAS/releases/download/${{ env.PTOAS_VERSION }}/ptoas-bin-aarch64.tar.gz \
             -o /tmp/ptoas-bin-aarch64.tar.gz
          echo "${{ env.PTOAS_SHA256 }}  /tmp/ptoas-bin-aarch64.tar.gz" | sha256sum -c -
          mkdir -p $GITHUB_WORKSPACE/ptoas-bin
          tar -xzf /tmp/ptoas-bin-aarch64.tar.gz -C $GITHUB_WORKSPACE/ptoas-bin
          chmod +x $GITHUB_WORKSPACE/ptoas-bin/ptoas
          chmod +x $GITHUB_WORKSPACE/ptoas-bin/bin/ptoas

      - name: Clone pto-isa repository
        run: |
          timeout 60 git clone https://github.com/hw-native-sys/pto-isa.git $GITHUB_WORKSPACE/pto-isa \
            || { rm -rf $GITHUB_WORKSPACE/pto-isa; timeout 300 git clone https://gitcode.com/luohuan40/pto-isa.git $GITHUB_WORKSPACE/pto-isa; }
          cd $GITHUB_WORKSPACE/pto-isa
          git checkout 016396b57e2c17093f1194e6acd89bb112b0ab24

      - name: Install simpler
        run: |
          rm -rf ./runtime/build
          pip install -v ./runtime

      - name: Run A5 system tests
        run: |
          task-submit --timeout 1800 --max-time 1800 --device 1 \
            --run "pytest tests/st/runtime/ops/test_assemble.py tests/st/runtime/ops/test_mscatter.py tests/st/runtime/framework_and_models/test_qwen3_decode_scope3_mixed.py tests/st/runtime/control_flow/test_dyn_orch_shape.py::TestDynOrchShapeOperations::test_dyn_orch_paged_attention -v --forked --platform=a5 --device=1 --pto-isa-commit=016396b57e2c17093f1194e6acd89bb112b0ab24 \
              -k 'not (test_tile_row_expand or test_fillpad_zero or test_fillpad_max or test_fillpad_min or TestMscatter)'"

  notify-on-failure:
    name: Open issue on failure
    needs: [a5-system-tests]
    if: |
      always() &&
      github.event_name == 'schedule' &&
      needs.a5-system-tests.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or update Daily CI failure issue
        uses: actions/github-script@v7
        env:
          A5_RESULT: ${{ needs.a5-system-tests.result }}
        with:
          script: |
            const ISSUE_LABEL = 'daily-ci-failure';
            const ISSUE_TITLE = '[Daily CI] Failure';

            const today = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;

            const failedJobs = [];
            if (process.env.A5_RESULT === 'failure') failedJobs.push('a5-system-tests');

            const body = [
              `Daily CI run failed on **${today}**.`,
              ``,
              `- Workflow run: ${runUrl}`,
              `- Commit: [\`${context.sha.slice(0, 7)}\`](${commitUrl})`,
              `- Branch: \`${context.ref}\``,
              `- Failed jobs: ${failedJobs.map(j => `\`${j}\``).join(', ') || 'unknown'}`,
              ``,
              `Please investigate the failure and either fix the underlying issue or update this issue with progress. Close this issue once Daily CI is green again.`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ISSUE_LABEL,
              per_page: 100,
            });

            const match = existing.data.find(issue => issue.title === ISSUE_TITLE);

            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
              core.notice(`Appended failure comment to existing issue #${match.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: ISSUE_TITLE,
                body,
                labels: [ISSUE_LABEL, 'bug'],
              });
              core.notice(`Created new Daily CI failure issue #${created.data.number}`);
            }
